# Test profile configuration

# H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:akazukin_test;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate - drop-and-create for tests (no Flyway)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.flyway.migrate-at-start=false

# JWT configuration
mp.jwt.verify.publickey.location=/publicKey.pem
mp.jwt.verify.issuer=akazukin
smallrye.jwt.sign.key.location=/privateKey.pem
akazukin.jwt.access-token-duration=PT15M
akazukin.jwt.refresh-token-duration=P7D

# Disable AWS DevServices
quarkus.sqs.devservices.enabled=false
quarkus.dynamodb.devservices.enabled=false
quarkus.secretsmanager.devservices.enabled=false

# AWS config placeholders (mocked in tests)
akazukin.sqs.queue-url=http://localhost:4566/000000000000/test-queue
quarkus.sqs.endpoint-override=http://localhost:4566
quarkus.sqs.aws.region=ap-northeast-1
quarkus.sqs.aws.credentials.type=static
quarkus.sqs.aws.credentials.static-provider.access-key-id=test
quarkus.sqs.aws.credentials.static-provider.secret-access-key=test
akazukin.scheduler.role-arn=arn:aws:iam::123456789012:role/test
akazukin.scheduler.target-arn=arn:aws:sqs:ap-northeast-1:123456789012:test

# Token encryption key
akazukin.crypto.encryption-key=dGhpc2lzYWRldmVsb3BtZW50a2V5Zm9ydGVzdDEyMw==

# Minimize logging
quarkus.log.level=WARN
quarkus.log.category."com.akazukin".level=INFO
quarkus.log.file.enable=false

# Disable CSRF protection for REST API tests
quarkus.rest-csrf.enabled=false

# HTTP port
quarkus.http.test-port=0

# Force 401 for unauthenticated requests to @RolesAllowed endpoints
quarkus.http.auth.proactive=true

# SmallRye JWT decryption key (needed because Renarde enables token decryption)
smallrye.jwt.token.decryption.key.location=/privateKey.pem
mp.jwt.decrypt.key.location=/privateKey.pem
