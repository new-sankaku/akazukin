{#include base}
{#title}{msg:post_list_page_title} - {msg:app_title}{/title}
{#body}
{#appheader /}

<div class="ak-layout">
    {#sidebar active="posts" /}

    <main class="ak-main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
            <h2 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.08em; margin: 0;">{msg:post_list_heading}</h2>
            <a href="/posts/compose" role="button"
                style="background: var(--accent-gold, var(--ak-primary)); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.9rem; font-weight: 600; text-decoration: none; letter-spacing: 0.05em; display: inline-block;">{msg:post_list_new_post}</a>
        </div>

        <div class="ak-card" style="background: var(--bg-surface, var(--ak-bg-secondary)); border-color: var(--border-lt, var(--ak-border)); padding: 1rem 1.5rem; margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <label for="status-filter" style="font-weight: 600; color: var(--text-heading, var(--ak-text)); letter-spacing: 0.03em; white-space: nowrap;">{msg:post_list_filter_status}:</label>
                <select id="status-filter" onchange="filterByStatus(this.value)"
                    style="background: var(--bg-field, var(--ak-bg)); border: 1px solid var(--border, var(--ak-border)); border-radius: 4px; padding: 0.4rem 0.75rem; font-size: 0.9rem; color: var(--text-body, var(--ak-text)); min-width: 140px;">
                    <option value="ALL">{msg:post_list_filter_all}</option>
                    <option value="DRAFT">{msg:post_list_status_draft}</option>
                    <option value="SCHEDULED">{msg:post_list_status_scheduled}</option>
                    <option value="PUBLISHED">{msg:post_list_status_published}</option>
                    <option value="FAILED">{msg:post_list_status_failed}</option>
                </select>
            </div>
        </div>

        <div id="posts-list">
            <p style="color: var(--text-muted, var(--ak-text-muted));" aria-busy="true">{msg:post_list_loading}</p>
        </div>

        <div id="pagination" style="display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 1.5rem;"></div>
    </main>
</div>

<style>
    .ak-post-card {
        background: var(--bg-surface, var(--ak-bg-secondary));
        border: 1px solid var(--border-lt, var(--ak-border));
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
        transition: border-color 0.2s;
    }

    .ak-post-card:hover {
        border-color: var(--accent-gold, var(--ak-primary));
    }

    .ak-post-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 0.75rem;
    }

    .ak-post-card-content {
        color: var(--text-body, var(--ak-text));
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 0.75rem;
        word-break: break-word;
    }

    .ak-post-card-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-muted, var(--ak-text-muted));
        font-size: 0.8rem;
    }

    .ak-post-card-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
    }

    .ak-btn-detail {
        background: transparent;
        color: var(--accent-gold, var(--ak-primary));
        border: 1px solid var(--accent-gold, var(--ak-primary));
        padding: 0.35rem 0.9rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        letter-spacing: 0.03em;
        transition: background 0.2s, color 0.2s;
    }

    .ak-btn-detail:hover {
        background: var(--accent-gold, var(--ak-primary));
        color: white;
    }

    .ak-btn-delete {
        background: transparent;
        color: var(--status-error, #B04040);
        border: 1px solid var(--status-error, #B04040);
        padding: 0.35rem 0.9rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition: background 0.2s, color 0.2s;
    }

    .ak-btn-delete:hover {
        background: var(--status-error, #B04040);
        color: white;
    }

    .ak-btn-edit {
        background: transparent;
        color: var(--accent-gold, var(--ak-primary));
        border: 1px solid var(--accent-gold, var(--ak-primary));
        padding: 0.35rem 0.9rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        letter-spacing: 0.03em;
        transition: background 0.2s, color 0.2s;
    }

    .ak-btn-edit:hover {
        background: var(--accent-gold, var(--ak-primary));
        color: white;
    }

    .ak-empty-state {
        text-align: center;
        padding: 3rem 1.5rem;
        color: var(--text-muted, var(--ak-text-muted));
    }

    .ak-empty-state p {
        font-size: 1.1rem;
        margin-bottom: 1rem;
        letter-spacing: 0.05em;
    }
</style>

<script>
    var MSG_STATUS_DRAFT = '{msg:post_list_status_draft}';
    var MSG_STATUS_SCHEDULED = '{msg:post_list_status_scheduled}';
    var MSG_STATUS_PUBLISHED = '{msg:post_list_status_published}';
    var MSG_STATUS_FAILED = '{msg:post_list_status_failed}';
    var MSG_EMPTY_POSTS = '{msg:post_list_empty}';
    var MSG_EMPTY_CREATE = '{msg:post_list_empty_create}';
    var MSG_BTN_DETAIL = '{msg:post_list_btn_detail}';
    var MSG_BTN_EDIT = '{msg:post_list_btn_edit}';
    var MSG_BTN_DELETE = '{msg:post_list_btn_delete}';
    var MSG_PAGE_PREV = '{msg:post_list_page_prev}';
    var MSG_PAGE_NEXT = '{msg:post_list_page_next}';
    var MSG_PAGE_LABEL = '{msg:post_list_page_label}';
    var MSG_LOAD_ERROR = '{msg:post_list_load_error}';
    var MSG_LOAD_ERROR_DETAIL = '{msg:post_list_load_error_detail}';
    var MSG_DELETE_CONFIRM = '{msg:post_list_delete_confirm}';
    var MSG_DELETE_SUCCESS = '{msg:post_list_delete_success}';
    var MSG_DELETE_ERROR = '{msg:post_list_delete_error}';
    var MSG_DELETE_NETWORK_ERROR = '{msg:post_list_delete_network_error}';

    var currentPage = 0;
    var pageSize = 20;
    var allPosts = [];
    var currentFilter = 'ALL';

    var STATUS_LABELS = {
        'DRAFT': MSG_STATUS_DRAFT,
        'SCHEDULED': MSG_STATUS_SCHEDULED,
        'PUBLISHED': MSG_STATUS_PUBLISHED,
        'FAILED': MSG_STATUS_FAILED
    };

    document.addEventListener('DOMContentLoaded', function() {
        loadPosts(0);
    });

    async function loadPosts(page) {
        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        currentPage = page;

        try {
            var response = await fetch('/api/v1/posts?page=' + page + '&size=' + pageSize, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.ok) {
                allPosts = await response.json();
                renderFilteredPosts();
                renderPagination(allPosts.length);
            }
        } catch (err) {
            document.getElementById('posts-list').innerHTML =
                '<div class="ak-card" style="color: var(--status-error, var(--ak-primary));">' + MSG_LOAD_ERROR + '</div>';
            showToast('error', MSG_LOAD_ERROR, MSG_LOAD_ERROR_DETAIL);
        }
    }

    function filterByStatus(status) {
        currentFilter = status;
        renderFilteredPosts();
    }

    function renderFilteredPosts() {
        var filtered = allPosts;
        if (currentFilter !== 'ALL') {
            filtered = allPosts.filter(function(post) {
                return post.status === currentFilter;
            });
        }
        renderPosts(filtered);
    }

    function renderPosts(posts) {
        var container = document.getElementById('posts-list');
        if (posts.length === 0) {
            container.innerHTML =
                '<div class="ak-card ak-empty-state">' +
                    '<p>' + MSG_EMPTY_POSTS + '</p>' +
                    '<a href="/posts/compose" class="ak-btn-detail" style="display: inline-block; padding: 0.5rem 1.5rem; font-size: 0.9rem;">' + MSG_EMPTY_CREATE + '</a>' +
                '</div>';
            return;
        }

        container.innerHTML = posts.map(function(post) {
            var date = new Date(post.createdAt).toLocaleDateString('ja-JP', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            var statusLabel = STATUS_LABELS[post.status] || post.status;
            var statusClass = post.status ? post.status.toLowerCase() : 'draft';

            var contentPreview = post.content || '';
            if (contentPreview.length > 100) {
                contentPreview = contentPreview.substring(0, 100) + '...';
            }

            var platformsHtml = '';
            var platforms = post.targetPlatforms || [];
            if (post.targets && post.targets.length > 0) {
                platforms = post.targets.map(function(t) { return t.platform; });
            }
            platforms.forEach(function(p) {
                var cls = p.toLowerCase();
                platformsHtml += '<span class="platform-badge ' + escapeHtmlGlobal(cls) + '">' + escapeHtmlGlobal(p) + '</span>';
            });

            return '<div class="ak-post-card" data-status="' + escapeHtmlGlobal(post.status) + '">' +
                '<div class="ak-post-card-header">' +
                    '<span class="status-badge ' + escapeHtmlGlobal(statusClass) + '">' + escapeHtmlGlobal(statusLabel) + '</span>' +
                '</div>' +
                '<div class="ak-post-card-content">' + escapeHtmlGlobal(contentPreview) + '</div>' +
                '<div class="ak-post-card-meta">' +
                    '<span>' + date + '</span>' +
                    (platformsHtml ? '<span style="display: flex; flex-wrap: wrap; gap: 0.3rem;">' + platformsHtml + '</span>' : '') +
                '</div>' +
                '<div class="ak-post-card-actions">' +
                    '<a href="/posts/' + escapeHtmlGlobal(post.id) + '" class="ak-btn-detail">' + MSG_BTN_DETAIL + '</a>' +
                    ((post.status === 'DRAFT' || post.status === 'SCHEDULED') ? '<a href="/posts/compose?edit=' + encodeURIComponent(post.id) + '" class="ak-btn-edit">' + MSG_BTN_EDIT + '</a>' : '') +
                    '<button class="ak-btn-delete" onclick="deletePost(\'' + escapeHtmlGlobal(post.id) + '\')">' + MSG_BTN_DELETE + '</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function renderPagination(count) {
        var container = document.getElementById('pagination');
        var html = '';
        if (currentPage > 0) {
            html += '<button class="ak-btn-detail" onclick="loadPosts(' + (currentPage - 1) + ')">' + MSG_PAGE_PREV + '</button>';
        }
        html += '<span style="color: var(--text-sec, var(--ak-text-muted)); font-size: 0.9rem; letter-spacing: 0.05em;">' + MSG_PAGE_LABEL + ' ' + (currentPage + 1) + '</span>';
        if (count >= pageSize) {
            html += '<button class="ak-btn-detail" onclick="loadPosts(' + (currentPage + 1) + ')">' + MSG_PAGE_NEXT + '</button>';
        }
        container.innerHTML = html;
    }

    async function deletePost(id) {
        if (!confirm(MSG_DELETE_CONFIRM)) return;

        var token = localStorage.getItem('accessToken');
        try {
            var response = await fetch('/api/v1/posts/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok || response.status === 204) {
                showToast('success', MSG_DELETE_SUCCESS);
                loadPosts(currentPage);
            } else {
                await showApiError(response, MSG_DELETE_ERROR);
            }
        } catch (err) {
            showToast('error', MSG_DELETE_ERROR, MSG_DELETE_NETWORK_ERROR);
        }
    }

    function logout() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    }
</script>
{/body}
{/include}
