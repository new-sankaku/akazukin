{#include base}
{#title}Post Detail - Akazukin{/title}
{#body}
<header class="ak-header">
    <button class="ak-hamburger" onclick="toggleMobileMenu()" aria-label="Toggle menu">&#9776;</button>
    <h1>Akazukin</h1>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/posts">Posts</a>
        <a href="/posts/compose">Compose</a>
        <a href="/accounts">Accounts</a>
        <a href="#" onclick="toggleTheme()" id="theme-icon">Theme</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<div class="ak-layout">
    <aside class="ak-sidebar">
        <a href="/dashboard">Dashboard</a>
        <a href="/posts" class="active">Posts</a>
        <a href="/posts/compose">Compose</a>
        <a href="/accounts">Accounts</a>
    </aside>

    <main class="ak-main">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Post Detail</h2>
            <a href="/posts" role="button" class="secondary outline">Back to Posts</a>
        </div>

        <div id="post-detail">
            <p style="color: var(--ak-text-muted);" aria-busy="true">Loading post...</p>
        </div>

        <div id="post-error" style="display: none;"></div>

        <style>
            .ak-post-content {
                white-space: pre-wrap;
                word-break: break-word;
                font-size: 1.05rem;
                line-height: 1.6;
                padding: 1rem 0;
            }

            .ak-post-meta {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                color: var(--ak-text-muted);
                font-size: 0.85rem;
                margin-top: 0.5rem;
            }

            .ak-status-badge {
                display: inline-block;
                padding: 0.2rem 0.6rem;
                border-radius: 12px;
                font-size: 0.75rem;
                font-weight: 600;
                text-transform: uppercase;
            }

            .ak-status-DRAFT { background: #e2e3e5; color: #383d41; }
            .ak-status-SCHEDULED { background: #cce5ff; color: #004085; }
            .ak-status-PUBLISHED { background: #d4edda; color: #155724; }
            .ak-status-FAILED { background: #f8d7da; color: #721c24; }

            .ak-target-list {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            .ak-target-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.6rem 1rem;
                border: 1px solid var(--ak-border);
                border-radius: 6px;
            }

            .ak-delete-section {
                margin-top: 2rem;
                padding-top: 1.5rem;
                border-top: 1px solid var(--ak-border);
            }
        </style>
    </main>
</div>

<script>
    var postId = null;

    document.addEventListener('DOMContentLoaded', function() {
        var pathParts = window.location.pathname.split('/');
        postId = pathParts[pathParts.length - 1];
        if (postId) {
            loadPostDetail(postId);
        }
    });

    async function loadPostDetail(id) {
        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        try {
            var response = await fetch('/api/v1/posts/' + id, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.status === 404) {
                showError('Post not found. It may have been deleted.');
                return;
            }

            if (!response.ok) {
                var errorData = await response.json();
                showError(errorData.message || 'Failed to load post.');
                return;
            }

            var post = await response.json();
            renderPostDetail(post);
        } catch (err) {
            showError('Network error. Please try again.');
        }
    }

    function renderPostDetail(post) {
        var container = document.getElementById('post-detail');
        var createdAt = new Date(post.createdAt).toLocaleString();
        var scheduledLine = '';
        if (post.scheduledAt) {
            scheduledLine = '<span>Scheduled: ' + new Date(post.scheduledAt).toLocaleString() + '</span>';
        }

        var targetsHtml = '';
        if (post.targets && post.targets.length > 0) {
            targetsHtml = '<div class="ak-card" style="margin-top: 1.5rem;">' +
                '<h3>Target Platforms</h3>' +
                '<ul class="ak-target-list">';
            post.targets.forEach(function(target) {
                var targetStatus = target.status || 'PENDING';
                targetsHtml += '<li class="ak-target-item">' +
                    '<span>' + escapeHtml(target.platform) + '</span>' +
                    '<span class="ak-status-badge ak-status-' + escapeHtml(targetStatus) + '">' +
                    escapeHtml(targetStatus) + '</span>' +
                    '</li>';
            });
            targetsHtml += '</ul></div>';
        } else if (post.targetPlatforms && post.targetPlatforms.length > 0) {
            targetsHtml = '<div class="ak-card" style="margin-top: 1.5rem;">' +
                '<h3>Target Platforms</h3>' +
                '<ul class="ak-target-list">';
            post.targetPlatforms.forEach(function(platform) {
                targetsHtml += '<li class="ak-target-item">' +
                    '<span>' + escapeHtml(platform) + '</span>' +
                    '<span class="ak-status-badge ak-status-' + escapeHtml(post.status) + '">' +
                    escapeHtml(post.status) + '</span>' +
                    '</li>';
            });
            targetsHtml += '</ul></div>';
        }

        container.innerHTML =
            '<div class="ak-card">' +
                '<div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap;">' +
                    '<span class="ak-status-badge ak-status-' + escapeHtml(post.status) + '">' +
                    escapeHtml(post.status) + '</span>' +
                '</div>' +
                '<div class="ak-post-content">' + escapeHtml(post.content) + '</div>' +
                '<div class="ak-post-meta">' +
                    '<span>Created: ' + createdAt + '</span>' +
                    scheduledLine +
                '</div>' +
            '</div>' +
            targetsHtml +
            '<div class="ak-delete-section">' +
                '<h3>Danger Zone</h3>' +
                '<p style="color: var(--ak-text-muted); font-size: 0.85rem;">Deleting a post is permanent and cannot be undone.</p>' +
                '<button class="secondary" id="delete-btn"' +
                ' hx-delete="/api/v1/posts/' + escapeHtml(post.id) + '"' +
                ' hx-confirm="Are you sure you want to delete this post? This action cannot be undone."' +
                ' hx-swap="none"' +
                ' onclick="handleDelete(\'' + escapeHtml(post.id) + '\')"' +
                '>Delete Post</button>' +
            '</div>';
    }

    async function handleDelete(id) {
        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        if (!confirm('Are you sure you want to delete this post? This action cannot be undone.')) {
            return;
        }

        var deleteBtn = document.getElementById('delete-btn');
        if (deleteBtn) {
            deleteBtn.disabled = true;
            deleteBtn.setAttribute('aria-busy', 'true');
        }

        try {
            var response = await fetch('/api/v1/posts/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.ok || response.status === 204) {
                window.location.href = '/posts';
            } else {
                var errorData = await response.json();
                showError(errorData.message || 'Failed to delete post.');
            }
        } catch (err) {
            showError('Network error. Please try again.');
        } finally {
            if (deleteBtn) {
                deleteBtn.disabled = false;
                deleteBtn.removeAttribute('aria-busy');
            }
        }
    }

    function showError(message) {
        var errorDiv = document.getElementById('post-error');
        errorDiv.innerHTML = '<div class="ak-card" style="border-color: var(--ak-primary); color: var(--ak-primary);">' +
            escapeHtml(message) + '</div>';
        errorDiv.style.display = 'block';
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        var div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }
</script>
{/body}
{/include}
