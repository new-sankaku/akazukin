{#include base}
{#title}投稿詳細 - Akazukin{/title}
{#body}
{#appheader /}

<div class="ak-layout">
    {#sidebar active="posts" /}

    <main class="ak-main">
        <!-- ページヘッダー -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
            <h2 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.08em; margin: 0;">投稿詳細</h2>
            <a href="/posts" role="button"
                style="background: transparent; color: var(--text-sec, var(--ak-text-muted)); border: 1px solid var(--border, var(--ak-border)); padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; text-decoration: none; letter-spacing: 0.05em; transition: border-color 0.2s, color 0.2s;"
                onmouseover="this.style.borderColor='var(--accent-gold, var(--ak-primary))'; this.style.color='var(--accent-gold, var(--ak-primary))'"
                onmouseout="this.style.borderColor='var(--border, var(--ak-border))'; this.style.color='var(--text-sec, var(--ak-text-muted))'">投稿一覧に戻る</a>
        </div>

        <!-- 投稿詳細コンテンツ -->
        <div id="post-detail">
            <p style="color: var(--text-muted, var(--ak-text-muted));" aria-busy="true">投稿を読み込み中...</p>
        </div>

        <div id="post-error" style="display: none;"></div>
    </main>
</div>

<style>
    .ak-post-content {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 1.05rem;
        line-height: 1.7;
        padding: 1rem 0;
        color: var(--text-body, var(--ak-text));
    }

    .ak-post-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem;
        color: var(--text-muted, var(--ak-text-muted));
        font-size: 0.85rem;
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border-lt, var(--ak-border));
    }

    .ak-post-meta span {
        letter-spacing: 0.03em;
    }

    .ak-status-badge {
        display: inline-block;
        padding: 0.25rem 0.7rem;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.05em;
    }

    .ak-status-DRAFT { background: var(--bg-subtle, #E4DECC); color: var(--text-sec, #7A7464); }
    .ak-status-SCHEDULED { background: var(--status-warning, #C8A96E); color: #3D3A32; }
    .ak-status-PUBLISHED { background: var(--status-success, #6B8B4A); color: white; }
    .ak-status-FAILED { background: var(--status-error, #B04040); color: white; }

    .ak-target-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .ak-target-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.7rem 1rem;
        border: 1px solid var(--border-lt, var(--ak-border));
        border-radius: 6px;
        background: var(--bg-elevated, var(--ak-bg));
        transition: border-color 0.2s;
    }

    .ak-target-item:hover {
        border-color: var(--border, var(--ak-border));
    }

    .ak-danger-zone {
        margin-top: 2rem;
        padding: 1.5rem;
        border: 1px solid var(--status-error, #B04040);
        border-radius: 8px;
        background: var(--bg-surface, var(--ak-bg-secondary));
    }

    .ak-danger-zone h3 {
        color: var(--status-error, #B04040);
        font-weight: 600;
        letter-spacing: 0.05em;
        margin-top: 0;
        margin-bottom: 0.75rem;
        font-size: 1rem;
    }

    .ak-danger-zone p {
        color: var(--text-sec, var(--ak-text-muted));
        font-size: 0.85rem;
        margin-bottom: 1rem;
    }

    .ak-btn-danger {
        background: var(--status-error, #B04040);
        color: white;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: opacity 0.2s;
    }

    .ak-btn-danger:hover {
        opacity: 0.85;
    }

    .ak-btn-danger:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .ak-btn-edit {
        background: transparent;
        color: var(--accent-gold, var(--ak-primary));
        border: 1px solid var(--accent-gold, var(--ak-primary));
        padding: 0.5rem 1.2rem;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        letter-spacing: 0.05em;
        transition: background 0.2s, color 0.2s;
        display: inline-block;
    }

    .ak-btn-edit:hover {
        background: var(--accent-gold, var(--ak-primary));
        color: white;
    }

    .ak-btn-cancel {
        background: transparent;
        color: var(--status-error, #B04040);
        border: 1px solid var(--status-error, #B04040);
        padding: 0.5rem 1.2rem;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: background 0.2s, color 0.2s;
    }

    .ak-btn-cancel:hover {
        background: var(--status-error, #B04040);
        color: white;
    }

    .ak-btn-cancel:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .ak-btn-reschedule {
        background: var(--status-warning, #C8A96E);
        color: #3D3A32;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: opacity 0.2s;
    }

    .ak-btn-reschedule:hover {
        opacity: 0.85;
    }

    .ak-btn-reschedule:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .ak-actions-zone {
        margin-top: 1.5rem;
        padding: 1.5rem;
        border: 1px solid var(--border-lt, var(--ak-border));
        border-radius: 8px;
        background: var(--bg-surface, var(--ak-bg-secondary));
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
    }

    .ak-reschedule-zone {
        margin-top: 1.5rem;
        padding: 1.5rem;
        border: 1px solid var(--status-warning, #C8A96E);
        border-radius: 8px;
        background: var(--bg-surface, var(--ak-bg-secondary));
    }

    .ak-reschedule-zone h3 {
        color: var(--status-warning, #C8A96E);
        font-weight: 600;
        letter-spacing: 0.05em;
        margin-top: 0;
        margin-bottom: 0.75rem;
        font-size: 1rem;
    }
</style>

<script>
    var postId = null;

    var STATUS_LABELS = {
        'DRAFT': '下書き',
        'SCHEDULED': '予約済み',
        'PUBLISHED': '公開済み',
        'FAILED': '失敗',
        'PENDING': '保留中'
    };

    document.addEventListener('DOMContentLoaded', function() {
        var pathParts = window.location.pathname.split('/');
        postId = pathParts[pathParts.length - 1];
        if (postId) {
            loadPostDetail(postId);
        }
    });

    async function loadPostDetail(id) {
        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        try {
            var response = await fetch('/api/v1/posts/' + id, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.status === 404) {
                showToast('error', '投稿が見つかりません', '削除された可能性があります。');
                showError('投稿が見つかりません。削除された可能性があります。');
                return;
            }

            if (!response.ok) {
                await showApiError(response, '投稿の読み込みに失敗しました');
                return;
            }

            var post = await response.json();
            renderPostDetail(post);
        } catch (err) {
            showError('ネットワークエラーが発生しました。再度お試しください。');
        }
    }

    function renderPostDetail(post) {
        var container = document.getElementById('post-detail');

        var statusLabel = STATUS_LABELS[post.status] || post.status;

        var createdAt = new Date(post.createdAt).toLocaleDateString('ja-JP', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });

        var scheduledLine = '';
        if (post.scheduledAt) {
            var scheduledAt = new Date(post.scheduledAt).toLocaleDateString('ja-JP', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
            scheduledLine = '<span>予約日: ' + scheduledAt + '</span>';
        }

        // Target platforms section
        var targetsHtml = '';
        var hasTargets = false;

        if (post.targets && post.targets.length > 0) {
            hasTargets = true;
            targetsHtml = '<div class="ak-card" style="background: var(--bg-surface, var(--ak-bg-secondary)); border-color: var(--border-lt, var(--ak-border)); margin-top: 1.5rem;">' +
                '<h3 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.05em; margin-top: 0; margin-bottom: 1rem;">投稿先プラットフォーム</h3>' +
                '<ul class="ak-target-list">';
            post.targets.forEach(function(target) {
                var targetStatus = target.status || 'PENDING';
                var targetStatusLabel = STATUS_LABELS[targetStatus] || targetStatus;
                var platformCls = target.platform ? target.platform.toLowerCase() : '';
                targetsHtml += '<li class="ak-target-item">' +
                    '<span class="platform-badge ' + escapeHtmlGlobal(platformCls) + '">' + escapeHtmlGlobal(target.platform) + '</span>' +
                    '<span class="ak-status-badge ak-status-' + escapeHtmlGlobal(targetStatus) + '">' +
                    escapeHtmlGlobal(targetStatusLabel) + '</span>' +
                    '</li>';
            });
            targetsHtml += '</ul></div>';
        } else if (post.targetPlatforms && post.targetPlatforms.length > 0) {
            hasTargets = true;
            targetsHtml = '<div class="ak-card" style="background: var(--bg-surface, var(--ak-bg-secondary)); border-color: var(--border-lt, var(--ak-border)); margin-top: 1.5rem;">' +
                '<h3 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.05em; margin-top: 0; margin-bottom: 1rem;">投稿先プラットフォーム</h3>' +
                '<ul class="ak-target-list">';
            post.targetPlatforms.forEach(function(platform) {
                var platformCls = platform ? platform.toLowerCase() : '';
                targetsHtml += '<li class="ak-target-item">' +
                    '<span class="platform-badge ' + escapeHtmlGlobal(platformCls) + '">' + escapeHtmlGlobal(platform) + '</span>' +
                    '<span class="ak-status-badge ak-status-' + escapeHtmlGlobal(post.status) + '">' +
                    escapeHtmlGlobal(statusLabel) + '</span>' +
                    '</li>';
            });
            targetsHtml += '</ul></div>';
        }

        var isEditable = post.status === 'DRAFT' || post.status === 'SCHEDULED';

        var actionsHtml = '';
        if (isEditable) {
            actionsHtml = '<div class="ak-actions-zone">' +
                '<a href="/posts/compose?edit=' + encodeURIComponent(post.id) + '" class="ak-btn-edit">編集</a>';
            if (post.status === 'SCHEDULED') {
                actionsHtml += '<button class="ak-btn-cancel" id="cancel-btn" onclick="handleCancelSchedule(\'' + escapeHtmlGlobal(post.id) + '\')">予約をキャンセル</button>';
            }
            actionsHtml += '</div>';
        }

        var rescheduleHtml = '';
        if (post.status === 'SCHEDULED') {
            rescheduleHtml = '<div class="ak-reschedule-zone">' +
                '<h3>予約日時の変更</h3>' +
                '<div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">' +
                    '<input type="datetime-local" id="reschedule-datetime" ' +
                        'onclick="this.showPicker && this.showPicker()" ' +
                        'style="background: var(--bg-field, var(--ak-bg)); border: 1px solid var(--border, var(--ak-border)); border-radius: 4px; padding: 0.5rem 0.75rem; font-size: 0.95rem; color: var(--text-body, var(--ak-text)); cursor: pointer;">' +
                    '<button class="ak-btn-reschedule" id="reschedule-btn" onclick="handleReschedule(\'' + escapeHtmlGlobal(post.id) + '\')">予約日時を変更</button>' +
                '</div>' +
            '</div>';
        }

        container.innerHTML =
            '<div class="ak-card" style="background: var(--bg-surface, var(--ak-bg-secondary)); border-color: var(--border-lt, var(--ak-border));">' +
                '<div style="margin-bottom: 0.5rem;">' +
                    '<span class="ak-status-badge ak-status-' + escapeHtmlGlobal(post.status) + '">' +
                    escapeHtmlGlobal(statusLabel) + '</span>' +
                '</div>' +
                '<div class="ak-post-content">' + escapeHtmlGlobal(post.content) + '</div>' +
                '<div class="ak-post-meta">' +
                    '<span>作成日: ' + createdAt + '</span>' +
                    scheduledLine +
                '</div>' +
            '</div>' +
            targetsHtml +
            actionsHtml +
            rescheduleHtml +
            '<div class="ak-danger-zone">' +
                '<h3>危険な操作</h3>' +
                '<p>投稿の削除は元に戻せません。</p>' +
                '<button class="ak-btn-danger" id="delete-btn" onclick="handleDelete(\'' + escapeHtmlGlobal(post.id) + '\')">' +
                'この投稿を削除する</button>' +
            '</div>';
    }

    async function handleDelete(id) {
        if (!confirm('この投稿を本当に削除しますか？この操作は元に戻せません。')) {
            return;
        }

        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        var deleteBtn = document.getElementById('delete-btn');
        if (deleteBtn) {
            deleteBtn.disabled = true;
            deleteBtn.setAttribute('aria-busy', 'true');
            deleteBtn.textContent = '削除中...';
        }

        try {
            var response = await fetch('/api/v1/posts/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.ok || response.status === 204) {
                showToast('success', '投稿を削除しました');
                window.location.href = '/posts';
            } else {
                await showApiError(response, '投稿の削除に失敗しました');
            }
        } catch (err) {
            showToast('error', '投稿の削除に失敗しました', 'サーバーに接続できませんでした。再度お試しください。');
        } finally {
            if (deleteBtn) {
                deleteBtn.disabled = false;
                deleteBtn.removeAttribute('aria-busy');
                deleteBtn.textContent = 'この投稿を削除する';
            }
        }
    }

    async function handleCancelSchedule(id) {
        if (!confirm('この予約を本当にキャンセルしますか？')) {
            return;
        }

        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        var cancelBtn = document.getElementById('cancel-btn');
        if (cancelBtn) {
            cancelBtn.disabled = true;
            cancelBtn.setAttribute('aria-busy', 'true');
            cancelBtn.textContent = 'キャンセル中...';
        }

        try {
            var response = await fetch('/api/v1/posts/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.ok || response.status === 204) {
                showToast('success', '予約をキャンセルしました');
                window.location.href = '/posts';
            } else {
                await showApiError(response, '予約のキャンセルに失敗しました');
            }
        } catch (err) {
            showToast('error', '予約のキャンセルに失敗しました', 'サーバーに接続できませんでした。再度お試しください。');
        } finally {
            if (cancelBtn) {
                cancelBtn.disabled = false;
                cancelBtn.removeAttribute('aria-busy');
                cancelBtn.textContent = '予約をキャンセル';
            }
        }
    }

    async function handleReschedule(id) {
        var datetimeInput = document.getElementById('reschedule-datetime');
        if (!datetimeInput || !datetimeInput.value) {
            showToast('error', '日時を入力してください', '予約日時を選択してから変更ボタンを押してください。');
            return;
        }

        var token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        var rescheduleBtn = document.getElementById('reschedule-btn');
        if (rescheduleBtn) {
            rescheduleBtn.disabled = true;
            rescheduleBtn.setAttribute('aria-busy', 'true');
            rescheduleBtn.textContent = '変更中...';
        }

        var scheduledAt = new Date(datetimeInput.value).toISOString();

        try {
            var getResponse = await fetch('/api/v1/posts/' + id, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (getResponse.status === 401) {
                window.location.href = '/';
                return;
            }

            if (!getResponse.ok) {
                await showApiError(getResponse, '投稿の取得に失敗しました');
                return;
            }

            var post = await getResponse.json();

            var platforms = [];
            if (post.targets && post.targets.length > 0) {
                platforms = post.targets.map(function(t) { return t.platform; });
            } else if (post.targetPlatforms) {
                platforms = post.targetPlatforms;
            }

            var response = await fetch('/api/v1/posts/' + id, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    content: post.content,
                    mediaUrls: post.mediaUrls || [],
                    targetPlatforms: platforms,
                    scheduledAt: scheduledAt
                })
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.ok) {
                showToast('success', '予約日時を変更しました');
                loadPostDetail(id);
            } else {
                await showApiError(response, '予約日時の変更に失敗しました');
            }
        } catch (err) {
            showToast('error', '予約日時の変更に失敗しました', 'サーバーに接続できませんでした。再度お試しください。');
        } finally {
            if (rescheduleBtn) {
                rescheduleBtn.disabled = false;
                rescheduleBtn.removeAttribute('aria-busy');
                rescheduleBtn.textContent = '予約日時を変更';
            }
        }
    }

    function showError(message) {
        var errorDiv = document.getElementById('post-error');
        errorDiv.innerHTML = '<div class="ak-card" style="border-color: var(--status-error, var(--ak-primary)); color: var(--status-error, var(--ak-primary));">' +
            escapeHtmlGlobal(message) + '</div>';
        errorDiv.style.display = 'block';
    }

    function logout() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    }

    function toggleMobileMenu() {
        var sidebar = document.querySelector('.ak-sidebar');
        if (sidebar) sidebar.classList.toggle('ak-sidebar--open');
    }
</script>
{/body}
{/include}
