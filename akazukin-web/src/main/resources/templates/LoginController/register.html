{#include base}
{#title}{msg:register_title} - {msg:app_title}{/title}
{#body}
<div class="ak-auth-container">
    <div class="ak-card">
        <h2 style="text-align: center; margin-bottom: 0.25rem;">{msg:register_title}</h2>
        <p style="text-align: center; color: var(--text-muted, #9B9580); font-size: 0.9rem; letter-spacing: 0.05em;">
            {msg:register_subtitle}
        </p>

        <div style="border-top: 1px solid var(--border, #B8B19C); margin: 1.5rem 0;"></div>

        <form id="register-form" onsubmit="return handleRegister(event)">
            <label for="username">{msg:login_username}</label>
            <input type="text" id="username" name="username" placeholder="{msg:login_username_placeholder}" required minlength="3">

            <label for="email">{msg:register_email}</label>
            <input type="email" id="email" name="email" placeholder="{msg:register_email_placeholder}" required>

            <label for="password">{msg:login_password}</label>
            <input type="password" id="password" name="password" placeholder="{msg:login_password_placeholder}" required minlength="8">

            <label for="confirmPassword">{msg:register_confirm_password}</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="{msg:register_confirm_password_placeholder}" required>

            <button type="submit" id="register-btn" class="ak-btn-primary" style="width: 100%; margin-top: 1rem;">
                {msg:register_submit}
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.25rem; font-size: 0.9rem;">
            {msg:register_has_account} <a href="/">{msg:register_login_link}</a>
        </p>
    </div>
</div>

<script>
    async function handleRegister(event) {
        event.preventDefault();
        const btn = document.getElementById('register-btn');

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            showToast('error', 'エラー', 'パスワードが一致しません');
            return false;
        }

        btn.disabled = true;
        btn.setAttribute('aria-busy', 'true');

        try {
            const response = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (!response.ok) {
                await showApiError(response, 'アカウント作成に失敗しました');
                return false;
            }

            const data = await response.json();
            localStorage.setItem('accessToken', data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);
            window.location.href = '/dashboard';
        } catch (err) {
            showToast('error', 'エラー', 'ネットワークエラーが発生しました。再度お試しください。');
        } finally {
            btn.disabled = false;
            btn.removeAttribute('aria-busy');
        }
        return false;
    }
</script>
{/body}
{/include}
