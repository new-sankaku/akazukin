{#include base}
{#title}{msg:register_title} - {msg:app_title}{/title}
{#body}
<div class="ak-auth-container">
    <h2>{msg:register_title}</h2>
    <p style="text-align: center; color: var(--ak-text-muted);">{msg:register_subtitle}</p>

    <div id="register-error" class="ak-card" style="display: none; border-color: var(--ak-primary); color: var(--ak-primary);"></div>

    <form id="register-form" onsubmit="return handleRegister(event)">
        <label for="username">{msg:login_username}</label>
        <input type="text" id="username" name="username" placeholder="{msg:login_username_placeholder}" required minlength="3">

        <label for="email">{msg:register_email}</label>
        <input type="email" id="email" name="email" placeholder="{msg:register_email_placeholder}" required>

        <label for="password">{msg:login_password}</label>
        <input type="password" id="password" name="password" placeholder="{msg:login_password_placeholder}" required minlength="8">

        <label for="confirmPassword">{msg:register_confirm_password}</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="{msg:register_confirm_password_placeholder}" required>

        <button type="submit" class="contrast">{msg:register_submit}</button>
    </form>

    <p style="text-align: center; margin-top: 1rem;">
        {msg:register_has_account} <a href="/">{msg:register_login_link}</a>
    </p>
</div>

<script>
    async function handleRegister(event) {
        event.preventDefault();
        const errorDiv = document.getElementById('register-error');
        errorDiv.style.display = 'none';

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            errorDiv.textContent = 'Passwords do not match';
            errorDiv.style.display = 'block';
            return false;
        }

        try {
            const response = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (!response.ok) {
                const data = await response.json();
                errorDiv.textContent = data.message || 'Registration failed';
                errorDiv.style.display = 'block';
                return false;
            }

            const data = await response.json();
            localStorage.setItem('accessToken', data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);
            window.location.href = '/dashboard';
        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.style.display = 'block';
        }
        return false;
    }
</script>
{/body}
{/include}
