{#include base}
{#title}Register - Akazukin{/title}
{#body}
<div class="ak-auth-container">
    <h2>Create Account</h2>
    <p style="text-align: center; color: var(--ak-text-muted);">Join Akazukin to manage your SNS accounts</p>

    <div id="register-error" class="ak-card" style="display: none; border-color: var(--ak-primary); color: var(--ak-primary);"></div>

    <form id="register-form" onsubmit="return handleRegister(event)">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Choose a password" required minlength="8">

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>

        <button type="submit" class="contrast">Create Account</button>
    </form>

    <p style="text-align: center; margin-top: 1rem;">
        Already have an account? <a href="/">Sign In</a>
    </p>
</div>

<script>
    async function handleRegister(event) {
        event.preventDefault();
        const errorDiv = document.getElementById('register-error');
        errorDiv.style.display = 'none';

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            errorDiv.textContent = 'Passwords do not match';
            errorDiv.style.display = 'block';
            return false;
        }

        try {
            const response = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (!response.ok) {
                const data = await response.json();
                errorDiv.textContent = data.message || 'Registration failed';
                errorDiv.style.display = 'block';
                return false;
            }

            const data = await response.json();
            localStorage.setItem('accessToken', data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);
            window.location.href = '/dashboard';
        } catch (err) {
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.style.display = 'block';
        }
        return false;
    }
</script>
{/body}
{/include}
