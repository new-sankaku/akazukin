{#include base}
{#title}Dashboard - Akazukin{/title}
{#body}
<header class="ak-header">
    <h1>Akazukin</h1>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/posts">Posts</a>
        <a href="/posts/compose">Compose</a>
        <a href="/accounts">Accounts</a>
        <a href="#" onclick="toggleTheme()">Theme</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<div class="ak-layout">
    <aside class="ak-sidebar">
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/posts">Posts</a>
        <a href="/posts/compose">Compose</a>
        <a href="/accounts">Accounts</a>
    </aside>

    <main class="ak-main">
        <h2>Dashboard</h2>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;"
             id="dashboard-stats"
             hx-get="/api/v1/dashboard/summary"
             hx-trigger="load"
             hx-headers='js:{"Authorization": "Bearer " + localStorage.getItem("accessToken")}'
             hx-swap="innerHTML">
            <div class="ak-card ak-stat">
                <h3>--</h3>
                <p>Total Posts</p>
            </div>
            <div class="ak-card ak-stat">
                <h3>--</h3>
                <p>Connected Accounts</p>
            </div>
        </div>

        <div class="ak-card" style="margin-top: 2rem;">
            <h3>Quick Actions</h3>
            <p>
                <a href="/posts/compose" role="button">Compose New Post</a>
                <a href="/accounts" role="button" class="secondary">Manage Accounts</a>
            </p>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadDashboard();
    });

    async function loadDashboard() {
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/';
            return;
        }

        try {
            const response = await fetch('/api/v1/dashboard/summary', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                window.location.href = '/';
                return;
            }

            if (response.ok) {
                const data = await response.json();
                document.getElementById('dashboard-stats').innerHTML =
                    '<div class="ak-card ak-stat"><h3>' + data.totalPosts + '</h3><p>Total Posts</p></div>' +
                    '<div class="ak-card ak-stat"><h3>' + data.totalAccounts + '</h3><p>Connected Accounts</p></div>';
            }
        } catch (err) {
            console.error('Failed to load dashboard', err);
        }
    }

    function logout() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    }
</script>
{/body}
{/include}
