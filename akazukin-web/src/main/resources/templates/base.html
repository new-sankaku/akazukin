<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#insert title}{msg:app_title}{/insert}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    {#bundle /}
</head>
<body>
    <!-- Toast notification container -->
    <div id="ak-toast-container"></div>

    <!-- Notification indicator (populated by JS on pages that need it) -->
    <div id="ak-notification-indicator" style="display: none; position: fixed; top: 0.75rem; right: 1rem; z-index: 1000;">
        <a href="/notifications" style="position: relative; color: var(--text-heading, var(--ak-text)); text-decoration: none; font-size: 1.2rem;" title="通知">
            <i class="fas fa-bell"></i>
            <span id="ak-notification-badge"
                style="display: none; position: absolute; top: -6px; right: -8px; background: var(--status-error, #B04040); color: white; font-size: 0.6rem; font-weight: 700; min-width: 16px; height: 16px; border-radius: 50%; text-align: center; line-height: 16px; padding: 0 3px;"></span>
        </a>
    </div>

    {#insert body}{/insert}

    <footer class="ak-footer">&copy; 2026 Akazukin &mdash; 複数SNS一元管理ツール</footer>

    <script>
        function showToast(type, title, detail, durationMs) {
            if (durationMs === undefined) durationMs = 8000;
            var container = document.getElementById('ak-toast-container');
            var toast = document.createElement('div');
            toast.className = 'ak-toast ak-toast--' + type;

            var closeBtn = '<button class="ak-toast-close" onclick="this.parentElement.remove()">&times;</button>';
            var detailHtml = detail ? '<div class="ak-toast-detail">' + escapeHtmlGlobal(detail) + '</div>' : '';
            toast.innerHTML = closeBtn +
                '<div class="ak-toast-title">' + escapeHtmlGlobal(title) + '</div>' +
                detailHtml;

            container.appendChild(toast);

            requestAnimationFrame(function() { toast.classList.add('ak-toast--visible'); });

            if (durationMs > 0) {
                setTimeout(function() {
                    toast.classList.remove('ak-toast--visible');
                    setTimeout(function() { toast.remove(); }, 300);
                }, durationMs);
            }
        }

        async function showApiError(response, fallbackMessage) {
            var title = fallbackMessage || 'An error occurred';
            var detail = null;
            try {
                var data = await response.json();
                if (data.message) title = data.message;
                if (data.details) detail = data.details;
            } catch (e) {
            }
            showToast('error', title, detail, 0);
        }

        function escapeHtmlGlobal(text) {
            if (text === null || text === undefined) return '';
            var div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
    </script>
</body>
</html>
