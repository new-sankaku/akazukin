{#include base}
{#title}承認レビュー - Akazukin{/title}
{#body}
<header class="ak-header">
    <button class="ak-hamburger" onclick="toggleMobileMenu()" aria-label="メニュー切替">&#9776;</button>
    <h1>Akazukin</h1>
    <nav>
        <a href="/dashboard">ダッシュボード</a>
        <a href="/posts">投稿一覧</a>
        <a href="/posts/compose">新規投稿</a>
        <a href="/accounts">アカウント管理</a>
        <a href="/approvals" class="active">承認</a>
        <a href="/audit-logs">監査ログ</a>
        <a href="#" onclick="logout()">ログアウト</a>
    </nav>
</header>

<div class="ak-layout">
    <aside class="ak-sidebar">
        <a href="/dashboard">ダッシュボード</a>
        <a href="/posts">投稿一覧</a>
        <a href="/posts/compose">新規投稿</a>
        <a href="/accounts">アカウント管理</a>
        <a href="/approvals" class="active">承認</a>
        <a href="/audit-logs">監査ログ</a>
    </aside>

    <main class="ak-main">
        <div style="margin-bottom: 1.5rem;">
            <a href="/approvals" style="color: var(--accent-gold, var(--ak-primary)); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.05em;">← 承認一覧に戻る</a>
        </div>

        <h2 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.08em; margin-bottom: 1.5rem;">承認レビュー</h2>

        <!-- 投稿内容 -->
        <div class="ak-card" style="background: var(--bg-surface, var(--ak-bg-secondary)); border-color: var(--border-lt, var(--ak-border)); margin-bottom: 1.5rem;">
            <h3 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.05em; margin-top: 0; margin-bottom: 1rem;">投稿内容</h3>
            <div id="approval-content" style="color: var(--text-body, var(--ak-text)); font-size: 0.95rem; line-height: 1.8; white-space: pre-wrap; word-break: break-word;" aria-busy="true">
                読み込み中...
            </div>
            <div id="approval-meta" style="margin-top: 1rem; color: var(--text-muted, var(--ak-text-muted)); font-size: 0.8rem;"></div>
        </div>

        <!-- 承認・却下フォーム -->
        <div class="ak-card" style="background: var(--bg-surface, var(--ak-bg-secondary)); border-color: var(--border-lt, var(--ak-border));">
            <h3 style="color: var(--text-heading, var(--ak-text)); font-weight: 400; letter-spacing: 0.05em; margin-top: 0; margin-bottom: 1rem;">判定</h3>
            <div style="margin-bottom: 1rem;">
                <label for="comment" style="display: block; font-weight: 600; color: var(--text-heading, var(--ak-text)); margin-bottom: 0.5rem; letter-spacing: 0.05em;">コメント（任意）</label>
                <textarea id="comment" rows="3" placeholder="承認・却下の理由やコメントを入力..."
                    style="width: 100%; background: var(--bg-field, var(--ak-bg)); border: 1px solid var(--border, var(--ak-border)); border-radius: 4px; padding: 0.75rem; font-size: 1rem; color: var(--text-body, var(--ak-text)); resize: vertical; font-family: inherit; line-height: 1.6;"></textarea>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button type="button" id="approve-btn" onclick="submitDecision('APPROVED')"
                    style="background: rgba(106, 168, 106, 0.15); color: #4A7A4A; border: 1px solid #8AB88A; padding: 0.75rem 2rem; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.08em;">
                    承認する
                </button>
                <button type="button" id="reject-btn" onclick="submitDecision('REJECTED')"
                    style="background: transparent; color: var(--status-error, #B04040); border: 1px solid var(--status-error, #B04040); padding: 0.75rem 2rem; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.08em;">
                    却下する
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    var approvalId = '{approvalId}';

    document.addEventListener('DOMContentLoaded', function() {
        loadApprovalDetail();
    });

    async function loadApprovalDetail() {
        var token = localStorage.getItem('accessToken');
        if (!token) { window.location.href = '/'; return; }

        try {
            var response = await fetch('/api/v1/approvals/pending?page=0&size=100', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.status === 401) { window.location.href = '/'; return; }
            if (!response.ok) {
                document.getElementById('approval-content').textContent = '読み込みに失敗しました';
                return;
            }
            var data = await response.json();
            var approvals = Array.isArray(data) ? data : (data.data || []);
            var approval = approvals.find(function(a) { return a.id === approvalId; });

            if (!approval) {
                document.getElementById('approval-content').textContent = '承認リクエストが見つかりませんでした';
                return;
            }

            document.getElementById('approval-content').textContent = approval.postContent || approval.content || '';
            var meta = '';
            if (approval.requesterName || approval.requesterId) {
                meta += '申請者: ' + escapeHtmlGlobal(approval.requesterName || approval.requesterId);
            }
            if (approval.requestedAt) {
                var date = new Date(approval.requestedAt).toLocaleDateString('ja-JP', {
                    year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                meta += (meta ? ' | ' : '') + '申請日: ' + escapeHtmlGlobal(date);
            }
            document.getElementById('approval-meta').innerHTML = meta;
        } catch (err) {
            document.getElementById('approval-content').textContent = '読み込みに失敗しました';
            showToast('error', '承認リクエストの読み込みに失敗しました');
        }
    }

    async function submitDecision(decision) {
        var token = localStorage.getItem('accessToken');
        if (!token) { window.location.href = '/'; return; }

        var comment = document.getElementById('comment').value;
        var approveBtn = document.getElementById('approve-btn');
        var rejectBtn = document.getElementById('reject-btn');
        approveBtn.disabled = true;
        rejectBtn.disabled = true;

        try {
            var response = await fetch('/api/v1/approvals/' + approvalId + '/decide', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ decision: decision, comment: comment })
            });

            if (!response.ok) {
                await showApiError(response, '処理に失敗しました');
                return;
            }

            showToast('success', decision === 'APPROVED' ? '承認しました' : '却下しました');
            setTimeout(function() { window.location.href = '/approvals'; }, 1000);
        } catch (err) {
            showToast('error', 'ネットワークエラー', 'サーバーに接続できませんでした。');
        } finally {
            approveBtn.disabled = false;
            rejectBtn.disabled = false;
        }
    }

    function logout() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.href = '/';
    }

    function toggleMobileMenu() {
        var sidebar = document.querySelector('.ak-sidebar');
        if (sidebar) sidebar.classList.toggle('ak-sidebar--open');
    }
</script>
{/body}
{/include}
