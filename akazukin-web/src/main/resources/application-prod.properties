# Database credentials (no defaults - must be set via environment variables)
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# Encryption key (no default - must be set via environment variable)
%prod.akazukin.crypto.encryption-key=${AKAZUKIN_CRYPTO_KEY}

# Connection pool for production
quarkus.datasource.jdbc.max-size=30
quarkus.datasource.jdbc.min-size=5

# Log level for production
quarkus.log.level=INFO
quarkus.log.file.enable=true
quarkus.log.file.path=/var/log/akazukin/application.log
quarkus.log.file.rotation.max-file-size=100M
quarkus.log.file.rotation.max-backup-index=10
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# JSON structured logging in production
quarkus.log.console.json=true
quarkus.log.file.json=true

# OpenTelemetry: OTLP exporter in production
quarkus.otel.traces.exporter=otlp
quarkus.otel.exporter.otlp.enabled=true
