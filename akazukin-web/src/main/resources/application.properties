# Quarkus Application
quarkus.application.name=akazukin

# HTTP
quarkus.http.port=8080

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/akazukin
quarkus.datasource.username=akazukin
quarkus.datasource.password=akazukin

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=akazukin
smallrye.jwt.sign.key.location=privateKey.pem
akazukin.jwt.access-token-duration=PT15M
akazukin.jwt.refresh-token-duration=P7D

# Web Bundler
quarkus.web-bundler.dependencies.htmx=org.mvnpm:htmx.org:2.0.8

# SQS
akazukin.sqs.queue-url=${AKAZUKIN_SQS_QUEUE_URL:http://localhost:4566/000000000000/akazukin-posts}
quarkus.sqs.endpoint-override=${AKAZUKIN_SQS_ENDPOINT:http://localhost:4566}
quarkus.sqs.aws.region=${AWS_REGION:ap-northeast-1}
quarkus.sqs.aws.credentials.type=default

# EventBridge Scheduler
akazukin.scheduler.role-arn=${AKAZUKIN_SCHEDULER_ROLE_ARN:arn:aws:iam::123456789012:role/akazukin-scheduler}
akazukin.scheduler.target-arn=${AKAZUKIN_SCHEDULER_TARGET_ARN:arn:aws:sqs:ap-northeast-1:123456789012:akazukin-posts}

# Database connection pool
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=2

# Logging
quarkus.log.file.enable=true
quarkus.log.file.path=logs/akazukin.log
quarkus.log.file.rotation.max-file-size=50M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# HTTP static asset caching
quarkus.http.static-resources.caching.max-age=P7D
quarkus.http.static-resources.caching.cache-control=public,max-age=604800

# Request timeout
quarkus.http.read-timeout=60s

quarkus.micrometer.export.prometheus.enabled=true

quarkus.otel.service.name=akazukin
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.traces.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}

quarkus.log.console.json=false

quarkus.smallrye-health.root-path=/q/health
quarkus.health.extensions.enabled=true

com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/requestVolumeThreshold=10
com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/failureRatio=0.5
com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/delay=30000
com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/successThreshold=3
com.akazukin.adapter.core.FaultTolerantSnsAdapter/Retry/maxRetries=3
com.akazukin.adapter.core.FaultTolerantSnsAdapter/Retry/delay=1000
com.akazukin.adapter.core.FaultTolerantSnsAdapter/ExponentialBackoff/maxDelay=30000

quarkus.redis.hosts=${AKAZUKIN_REDIS_HOSTS:redis://localhost:6379}
quarkus.redis.timeout=5s

quarkus.cache.type=caffeine
quarkus.cache.caffeine."analytics-summary".expire-after-write=PT5M
quarkus.cache.caffeine."analytics-summary".maximum-size=1000
quarkus.cache.caffeine."sns-profile".expire-after-write=PT10M
quarkus.cache.caffeine."sns-profile".maximum-size=500

akazukin.rate-limit.general.capacity=100
akazukin.rate-limit.general.period=PT1M
akazukin.rate-limit.post.capacity=30
akazukin.rate-limit.post.period=PT1M
akazukin.rate-limit.ai.capacity=10
akazukin.rate-limit.ai.period=PT1M

akazukin.retention.audit-log-days=90
akazukin.retention.notification-days=30
