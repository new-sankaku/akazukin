# Quarkus Application
quarkus.application.name=akazukin

# HTTP
quarkus.http.port=8080

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/akazukin
quarkus.datasource.username=akazukin
quarkus.datasource.password=akazukin

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=akazukin
smallrye.jwt.sign.key.location=privateKey.pem
akazukin.jwt.access-token-duration=PT15M
akazukin.jwt.refresh-token-duration=P7D

# Web Bundler
quarkus.web-bundler.dependencies.htmx=org.mvnpm:htmx.org:2.0.8

# SQS
akazukin.sqs.queue-url=${AKAZUKIN_SQS_QUEUE_URL:http://localhost:4566/000000000000/akazukin-posts}
quarkus.sqs.endpoint-override=${AKAZUKIN_SQS_ENDPOINT:http://localhost:4566}
quarkus.sqs.aws.region=${AWS_REGION:ap-northeast-1}
quarkus.sqs.aws.credentials.type=default

# EventBridge Scheduler
akazukin.scheduler.role-arn=${AKAZUKIN_SCHEDULER_ROLE_ARN:arn:aws:iam::123456789012:role/akazukin-scheduler}
akazukin.scheduler.target-arn=${AKAZUKIN_SCHEDULER_TARGET_ARN:arn:aws:sqs:ap-northeast-1:123456789012:akazukin-posts}
