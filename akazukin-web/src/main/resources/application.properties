# Quarkus Application
quarkus.application.name=akazukin

# Package type (required for Lambda deployment)
quarkus.package.jar.type=legacy-jar

# HTTP
quarkus.http.port=8080
%dev.quarkus.http.port=38081

# CSRF - disable for REST API (JWT provides protection against CSRF)
quarkus.rest-csrf.enabled=false

# Lazy authentication - only verify JWT when @RolesAllowed is present
quarkus.http.auth.proactive=false

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/akazukin
quarkus.datasource.username=akazukin
quarkus.datasource.password=akazukin

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# JWT
mp.jwt.verify.publickey.location=/publicKey.pem
mp.jwt.verify.issuer=akazukin
smallrye.jwt.sign.key.location=/privateKey.pem
mp.jwt.token.header=Authorization
mp.jwt.token.cookie=none
smallrye.jwt.encrypt.key.location=/publicKey.pem
mp.jwt.decrypt.key.location=/privateKey.pem
akazukin.jwt.access-token-duration=PT15M
akazukin.jwt.refresh-token-duration=P7D

# Web Bundler
quarkus.web-bundler.dependencies.htmx=org.mvnpm:htmx.org:2.0.8

# SQS
akazukin.sqs.queue-url=${AKAZUKIN_SQS_QUEUE_URL:http://localhost:4566/000000000000/akazukin-posts}
quarkus.sqs.endpoint-override=${AKAZUKIN_SQS_ENDPOINT:http://localhost:4566}
quarkus.sqs.aws.region=${AWS_REGION:ap-northeast-1}
quarkus.sqs.aws.credentials.type=default

# EventBridge Scheduler
akazukin.scheduler.role-arn=${AKAZUKIN_SCHEDULER_ROLE_ARN:arn:aws:iam::123456789012:role/akazukin-scheduler}
akazukin.scheduler.target-arn=${AKAZUKIN_SCHEDULER_TARGET_ARN:arn:aws:sqs:ap-northeast-1:123456789012:akazukin-posts}

# Database connection pool
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=2

# Logging
quarkus.log.file.enable=true
quarkus.log.file.path=logs/akazukin.log
quarkus.log.file.rotation.max-file-size=50M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# HTTP static asset caching
quarkus.http.static-resources.caching.max-age=P7D
quarkus.http.static-resources.caching.cache-control=public,max-age=604800

# Token encryption key (Base64 encoded 256-bit key)
akazukin.crypto.encryption-key=${AKAZUKIN_CRYPTO_KEY:dGhpc2lzYWRldmVsb3BtZW50a2V5Zm9ydGVzdDEyMyE=}

# Request timeout
quarkus.http.read-timeout=60s

quarkus.index-dependency.domain.group-id=akazukin
quarkus.index-dependency.domain.artifact-id=akazukin-domain
quarkus.index-dependency.application.group-id=akazukin
quarkus.index-dependency.application.artifact-id=akazukin-application
quarkus.index-dependency.infrastructure.group-id=akazukin
quarkus.index-dependency.infrastructure.artifact-id=akazukin-infrastructure
quarkus.index-dependency.adapter-core.group-id=akazukin
quarkus.index-dependency.adapter-core.artifact-id=akazukin-adapter-sns.akazukin-adapter-core
quarkus.index-dependency.adapter-twitter.group-id=akazukin
quarkus.index-dependency.adapter-twitter.artifact-id=akazukin-adapter-sns.akazukin-adapter-twitter
quarkus.index-dependency.adapter-bluesky.group-id=akazukin
quarkus.index-dependency.adapter-bluesky.artifact-id=akazukin-adapter-sns.akazukin-adapter-bluesky
quarkus.index-dependency.adapter-mastodon.group-id=akazukin
quarkus.index-dependency.adapter-mastodon.artifact-id=akazukin-adapter-sns.akazukin-adapter-mastodon
quarkus.index-dependency.adapter-threads.group-id=akazukin
quarkus.index-dependency.adapter-threads.artifact-id=akazukin-adapter-sns.akazukin-adapter-threads
quarkus.index-dependency.adapter-instagram.group-id=akazukin
quarkus.index-dependency.adapter-instagram.artifact-id=akazukin-adapter-sns.akazukin-adapter-instagram
quarkus.index-dependency.adapter-reddit.group-id=akazukin
quarkus.index-dependency.adapter-reddit.artifact-id=akazukin-adapter-sns.akazukin-adapter-reddit
quarkus.index-dependency.adapter-telegram.group-id=akazukin
quarkus.index-dependency.adapter-telegram.artifact-id=akazukin-adapter-sns.akazukin-adapter-telegram
quarkus.index-dependency.adapter-vk.group-id=akazukin
quarkus.index-dependency.adapter-vk.artifact-id=akazukin-adapter-sns.akazukin-adapter-vk
quarkus.index-dependency.adapter-pinterest.group-id=akazukin
quarkus.index-dependency.adapter-pinterest.artifact-id=akazukin-adapter-sns.akazukin-adapter-pinterest
quarkus.index-dependency.ai-core.group-id=akazukin
quarkus.index-dependency.ai-core.artifact-id=akazukin-ai.akazukin-ai-core
quarkus.index-dependency.ai-ollama.group-id=akazukin
quarkus.index-dependency.ai-ollama.artifact-id=akazukin-ai.akazukin-ai-ollama
quarkus.index-dependency.adapter-mixi2.group-id=akazukin
quarkus.index-dependency.adapter-mixi2.artifact-id=akazukin-adapter-sns.akazukin-adapter-mixi2
quarkus.index-dependency.adapter-note.group-id=akazukin
quarkus.index-dependency.adapter-note.artifact-id=akazukin-adapter-sns.akazukin-adapter-note
quarkus.index-dependency.adapter-niconico.group-id=akazukin
quarkus.index-dependency.adapter-niconico.artifact-id=akazukin-adapter-sns.akazukin-adapter-niconico

akazukin.ai.enabled=true
akazukin.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
akazukin.ai.ollama.model=${OLLAMA_MODEL:qwen2.5:9b}
akazukin.ai.ollama.timeout=PT30S

akazukin.circuit-breaker.failure-threshold=5
akazukin.circuit-breaker.reset-timeout=PT60S

akazukin.media.storage-type=${MEDIA_STORAGE:local}
akazukin.media.local.base-dir=${MEDIA_LOCAL_DIR:./data/media}
akazukin.media.s3.bucket=${MEDIA_S3_BUCKET:akazukin-media}

quarkus.micrometer.export.prometheus.enabled=true

quarkus.otel.service.name=akazukin
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.traces.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}

quarkus.log.console.json=false

quarkus.smallrye-health.root-path=/q/health
quarkus.health.extensions.enabled=true

com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/requestVolumeThreshold=10
com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/failureRatio=0.5
com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/delay=30000
com.akazukin.adapter.core.FaultTolerantSnsAdapter/CircuitBreaker/successThreshold=3
com.akazukin.adapter.core.FaultTolerantSnsAdapter/Retry/maxRetries=3
com.akazukin.adapter.core.FaultTolerantSnsAdapter/Retry/delay=1000
com.akazukin.adapter.core.FaultTolerantSnsAdapter/ExponentialBackoff/maxDelay=30000

quarkus.redis.hosts=${AKAZUKIN_REDIS_HOSTS:redis://localhost:6379}
quarkus.redis.timeout=5s

quarkus.cache.type=caffeine
quarkus.cache.caffeine."analytics-summary".expire-after-write=PT5M
quarkus.cache.caffeine."analytics-summary".maximum-size=1000
quarkus.cache.caffeine."sns-profile".expire-after-write=PT10M
quarkus.cache.caffeine."sns-profile".maximum-size=500

akazukin.rate-limit.general.capacity=100
akazukin.rate-limit.general.period=PT1M
akazukin.rate-limit.post.capacity=30
akazukin.rate-limit.post.period=PT1M
akazukin.rate-limit.ai.capacity=10
akazukin.rate-limit.ai.period=PT1M

akazukin.retention.audit-log-days=90
akazukin.retention.notification-days=30

quarkus.default-locale=ja
quarkus.locales=ja,en

akazukin.notification.email.enabled=false
akazukin.notification.email.recipient=${AKAZUKIN_NOTIFICATION_EMAIL:admin@example.com}
quarkus.mailer.from=noreply@akazukin.app
quarkus.mailer.host=${AKAZUKIN_SMTP_HOST:localhost}
quarkus.mailer.port=${AKAZUKIN_SMTP_PORT:1025}
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.mock=true

akazukin.notification.webhook.enabled=false
akazukin.notification.webhook.url=${AKAZUKIN_WEBHOOK_URL:}

quarkus.native.additional-build-args=--initialize-at-run-time=com.akazukin.sdk
quarkus.native.resources.includes=db/migration/*.sql,messages/*.properties

# Suppress default Quarkus error page that exposes endpoint list
quarkus.http.non-application-root-path=/q
